<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>阅读统计</title>
    <style>
        :root {
            --text-main: #111111;
            --text-sub: #666666;
            --border-color: #EAEAEA;
            --card-bg: #F8F9FA;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #FFFFFF;
            color: var(--text-main);
            padding: 64px 24px 32px 24px;
            overflow: hidden;
        }
        .header {
            text-align: center;
            margin-bottom: 32px;
        }
        .total-value {
            font-size: 48px;
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: -1px;
            margin-bottom: 6px;
            white-space: nowrap;
        }
        .total-value span {
            font-size: 0.5em;
            font-weight: 600;
        }
        .total-value.small {
            font-size: 40px;
        }
        .total-value.smaller {
            font-size: 32px;
        }
        .total-value.smallest {
            font-size: 26px;
        }
        .total-label {
            font-size: 16px;
            font-weight: 500;
            color: var(--text-sub);
            letter-spacing: 0.5px;
            margin-top: 4px;
        }
        .stats-summary {
            display: flex;
            justify-content: space-between;
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px 16px;
            margin-bottom: 32px;
        }
        .stat-item {
            text-align: center;
            flex: 1;
            position: relative;
        }
        .stat-item:not(:last-child)::after {
            content: '';
            position: absolute;
            right: 0;
            top: 20%;
            height: 60%;
            width: 1px;
            background-color: #DDE0E3;
        }
        .stat-value {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 4px;
            white-space: nowrap;
        }
        .stat-value.small {
            font-size: 18px;
        }
        .stat-value.smaller {
            font-size: 15px;
        }
        .stat-value.smallest {
            font-size: 13px;
        }
        .stat-label {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-sub);
        }
        .chart-container {
            width: 100%;
            height: 220px;
            position: relative;
        }
        .chart-footer {
            text-align: center;
            font-size: 14px;
            color: var(--text-sub);
            margin-top: 16px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="total-value" id="allTimeTotal">--</div>
        <div class="total-label" id="startDateLabel">累计阅读</div>
    </div>

    <div class="stats-summary">
        <div class="stat-item">
            <div class="stat-value" id="totalTime">--</div>
            <div class="stat-label">30天（分钟）</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="avgTime">--</div>
            <div class="stat-label">日均（分钟）</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="maxTime">--</div>
            <div class="stat-label">最长一天</div>
        </div>
    </div>

    <div class="chart-container">
        <canvas id="statsChart"></canvas>
    </div>
    <div class="chart-footer" id="chartFooter">日均阅读--分钟</div>

    <script src="js/chart.min.js"></script>
    <script>
        function formatHourMin(minutes) {
            if (minutes < 60) {
                return minutes + '分钟';
            }
            var hours = Math.floor(minutes / 60);
            var mins = minutes % 60;
            if (mins === 0) {
                return hours + '小时';
            }
            return hours + '小时' + mins + '分';
        }

        function formatHourMinHTML(minutes) {
            if (minutes < 60) {
                return minutes + '<span>分钟</span>';
            }
            var hours = Math.floor(minutes / 60);
            var mins = minutes % 60;
            if (mins === 0) {
                return hours + '<span>小时</span>';
            }
            return hours + '<span>小时</span>' + mins + '<span>分钟</span>';
        }

        function formatNumber(minutes) {
            return minutes.toString();
        }

        function autoSizeText(element, thresholds, classes) {
            var text = element.textContent;
            var len = text.length;
            element.classList.remove(classes[0], classes[1], classes[2]);
            if (classes[2] && len >= thresholds[2]) {
                element.classList.add(classes[2]);
            } else if (len >= thresholds[1]) {
                element.classList.add(classes[1]);
            } else if (len >= thresholds[0]) {
                element.classList.add(classes[0]);
            }
        }

        function initChart() {
            var statsJson = '[]';
            var allTimeMinutes = 0;
            var startDateStr = '';
            var totalDays = 1;

            if (typeof ReabbleStats !== 'undefined') {
                if (ReabbleStats.getStatsJson) {
                    statsJson = ReabbleStats.getStatsJson(30);
                }
                if (ReabbleStats.getTotalAllTime) {
                    allTimeMinutes = ReabbleStats.getTotalAllTime();
                }
                if (ReabbleStats.getStartDate) {
                    startDateStr = ReabbleStats.getStartDate();
                }
                if (ReabbleStats.getTotalDays) {
                    totalDays = ReabbleStats.getTotalDays();
                }
            }

            if (!startDateStr) {
                var d = new Date();
                startDateStr = d.getFullYear() + '-' + (d.getMonth() + 1) + '-' + d.getDate();
            }

            var dateParts = startDateStr.split('-');
            var startDateFormatted = dateParts[0] + '年' + dateParts[1] + '月' + dateParts[2] + '日至今';
            document.getElementById('startDateLabel').textContent = startDateFormatted;

            var allTimeTotalEl = document.getElementById('allTimeTotal');
            allTimeTotalEl.innerHTML = formatHourMinHTML(allTimeMinutes);
            autoSizeText(allTimeTotalEl, [7, 9, 11], ['small', 'smaller', 'smallest']);

            var data;
            try {
                data = JSON.parse(statsJson);
            } catch (e) {
                data = [];
            }

            var labels = [];
            var values = [];
            var totalMinutes = 0;
            var maxMinutes = 0;

            for (var i = 0; i < data.length; i++) {
                var record = data[i];
                var dateParts = record.date.split('-');
                var month = parseInt(dateParts[1], 10);
                var day = parseInt(dateParts[2], 10);

                if (i % 5 === 0 || i === data.length - 1) {
                    labels.push(month + '/' + day);
                } else {
                    labels.push('');
                }

                values.push(record.minutes);
                totalMinutes += record.minutes;
                if (record.minutes > maxMinutes) {
                    maxMinutes = record.minutes;
                }
            }

            var avgMinutes = data.length > 0 ? Math.round(totalMinutes / data.length) : 0;
            var allTimeAvgMinutes = totalDays > 0 ? Math.round(allTimeMinutes / totalDays) : 0;

            document.getElementById('chartFooter').textContent = '日均阅读' + allTimeAvgMinutes + '分钟';

            var totalTimeEl = document.getElementById('totalTime');
            var avgTimeEl = document.getElementById('avgTime');
            var maxTimeEl = document.getElementById('maxTime');
            
            totalTimeEl.textContent = formatNumber(totalMinutes);
            avgTimeEl.textContent = formatNumber(avgMinutes);
            maxTimeEl.textContent = formatHourMin(maxMinutes);
            
            autoSizeText(totalTimeEl, [4, 5, 6], ['small', 'smaller', 'smallest']);
            autoSizeText(avgTimeEl, [4, 5, 6], ['small', 'smaller', 'smallest']);
            autoSizeText(maxTimeEl, [4, 6, 8], ['small', 'smaller', 'smallest']);

            var ctx = document.getElementById('statsChart').getContext('2d');
            
            var gradient = ctx.createLinearGradient(0, 0, 0, 220);
            gradient.addColorStop(0, 'rgba(0, 0, 0, 0.08)');
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0.0)');

            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '阅读时长（分钟）',
                        data: values,
                        borderColor: '#000000',
                        backgroundColor: gradient,
                        borderWidth: 3,
                        fill: true,
                        tension: 0.4,
                        pointRadius: 0,
                        pointHoverRadius: 5,
                        pointBackgroundColor: '#FFFFFF',
                        pointBorderColor: '#000000',
                        pointBorderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: 'rgba(0,0,0,0.85)',
                            titleColor: '#FFFFFF',
                            bodyColor: '#FFFFFF',
                            titleFont: { size: 13, family: 'system-ui' },
                            bodyFont: { size: 14, weight: 'bold', family: 'system-ui' },
                            padding: 12,
                            cornerRadius: 8,
                            displayColors: false,
                            callbacks: {
                                label: function(context) {
                                    return context.parsed.y + ' 分钟';
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: {
                                display: false,
                                drawBorder: false
                            },
                            ticks: {
                                color: '#888888',
                                font: { size: 12, family: 'system-ui', weight: '500' },
                                maxRotation: 0,
                                padding: 8,
                                autoSkip: false
                            }
                        },
                        y: {
                            beginAtZero: true,
                            grid: {
                                color: '#EEEEEE',
                                borderDash: [6, 4],
                                drawBorder: false
                            },
                            ticks: {
                                color: '#888888',
                                font: { size: 12, family: 'system-ui', weight: '500' },
                                maxTicksLimit: 5,
                                padding: 8,
                                callback: function(value) {
                                    return value;
                                }
                            }
                        }
                    },
                    animation: false
                }
            });
        }

        document.addEventListener('DOMContentLoaded', initChart);
    </script>
</body>
</html>
